<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · Sarawak Talents</title>
    <meta name="description" content="A Sarawak Talents profile — one scan shares every link that matters.">
    <meta property="og:type" content="profile">
    <meta property="og:site_name" content="Sarawak Talents">
    <meta property="og:title" content="Sarawak Talents">
    <meta property="og:description" content="A Sarawak Talents digital name card.">
    <meta property="og:image" content="https://app.sarawaktalents.com/photos/linkpreview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://app.sarawaktalents.com/photos/linkpreview.jpg">
    <script src="https://unpkg.com/reicon@latest/cdn/reicon.min.js"></script>
    <link rel="stylesheet" href="../tailwind.css">
    <link rel="stylesheet" href="../transitions/index.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../profile.css">
    <link rel="stylesheet" href="../badge-toast.css">
    <link rel="icon" href="../sslogo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../icon-192.png">
    <script>
        (function () {
            var mode = localStorage.getItem('theme-mode');
            if (!mode) {
                var legacy = localStorage.getItem('theme');
                if (legacy === 'dark' || legacy === 'light') mode = legacy;
                else mode = 'system';
            }
            var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (dark) document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body class="pf-body">

    <header class="pf-topbar">
        <a href="../" class="pf-logo-pill" aria-label="Sarawak Talents">
            <img src="../sslogo.svg" alt="" class="brand-mark" width="27" height="28">
            <span class="brand-text">SarawakTalents<span class="brand-tld">.com</span></span>
        </a>
    </header>

    <main class="pf-main">
        <div id="pf-loading" class="pf-note">Loading…</div>

        <div id="pf-notfound" class="pf-note" hidden>
            <p>This profile isn't available.</p>
            <a href="../" class="pf-back">← Back to the directory</a>
        </div>

        <article id="pf-content" hidden>
            <!-- Header -->
            <div class="pf-head">
                <div class="pf-avatar" id="pf-avatar"><span id="pf-initials"></span><img id="pf-avatar-img" alt="" hidden></div>
                <div class="pf-head-text">
                    <h1 class="pf-name">
                        <span id="pf-name"></span>
                        <re-icon icon="verified" size="22" weight="filled" class="pf-verified" aria-hidden="true"></re-icon>
                        <span class="pf-org-inline" id="pf-org-inline" hidden></span>
                    </h1>
                    <p class="pf-loc" id="pf-loc"></p>
                    <p class="pf-role-org" id="pf-role-org" hidden></p>
                </div>
            </div>

            <!-- Role + bio -->
            <p class="pf-lead" id="pf-lead"></p>
            <p class="pf-bio" id="pf-bio" hidden></p>

            <!-- Tags -->
            <div class="pf-tags" id="pf-tags"></div>

            <!-- Achievement badges -->
            <div class="pf-badges-section" id="pf-badges-section" hidden>
                <h2 class="pf-section-title">Badges</h2>
                <div class="pf-badges-grid" id="pf-badges-grid"></div>
            </div>

            <!-- Interactive QR — tap a card, the code retargets; tap again to open -->
            <div class="pf-qr-live">
                <div class="qr-cols">
                    <div class="qr-card-box"><img class="qr-live-img" alt="QR code"></div>
                    <div class="qr-buttons" id="qr-buttons"></div>
                </div>
                <div class="qr-open-row" id="qr-open-row"></div>
            </div>

            <!-- Education -->
            <div class="pf-edu-section" id="pf-edu-section" hidden>
                <h2 class="pf-section-title">Education</h2>
                <p class="pf-edu" id="pf-edu"></p>
            </div>

            <!-- Actions -->
            <div class="pf-actions">
                <button type="button" id="pf-vcard-btn" class="pf-btn pf-btn--dark">Save contact</button>
                <button type="button" id="pf-copy-btn" class="pf-btn pf-btn--ghost">Copy link</button>
                <button type="button" id="pf-connect-btn" class="pf-btn pf-btn--ghost" hidden>Connect</button>
            </div>

            <hr class="pf-rule">
            <p class="pf-footnote">One scan shares everything that matters — <span id="pf-url-label"></span></p>
        </article>
    </main>

    <footer class="pf-footer">
        <span>© <span id="pf-year"></span> Sarawak Talents</span>
    </footer>

    <script src="../transitions.js"></script>
    <script src="../theme.js"></script>
    <script src="../site-paths.js"></script>
    <script src="../config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script src="../supabase-client.js"></script>
    <script src="../badge-toast.js"></script>
    <script src="../profile.js?v=20260714-socialaffix"></script>
    <script>Theme.init();</script>
</body>
</html>
